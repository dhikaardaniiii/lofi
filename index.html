<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lofi UI/UX: Input Menu & Resep</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>[Lofi] Input Menu & Resep</h1>
        <p>Fokus: Menentukan bahan baku (Resep) yang mengaktifkan pengurangan Stok.</p>
        
        <div class="box menu-info">
            <h2>1. Detail Menu</h2>
            <div class="form-group">
                <label for="nama_menu">Nama Menu:</label>
                <input type="text" id="nama_menu" placeholder="Contoh: Cappuccino">
            </div>
            <div class="form-group">
                <label for="harga">Harga Jual (Rp):</label>
                <input type="number" id="harga" placeholder="Contoh: 25000">
            </div>
        </div>

        <hr>

        <div class="box resep-komposisi">
            <h2>2. Resep Bahan Baku</h2>
            
            <div id="resep-list">
                <div class="resep-item" data-id="1">
                    <select class="bahan-select">
                        <option value="">-- Pilih Bahan Baku --</option>
                        <option value="kopi">Biji Kopi Arabika</option>
                        <option value="susu">Susu Full Cream</option>
                        <option value="gula">Gula Cair</option>
                    </select>
                    <input type="number" class="jumlah-pakai" placeholder="Jumlah">
                    <span class="satuan">(Satuan: Gram/ml/pcs)</span>
                    <button class="remove-btn"> [HAPUS] </button>
                </div>
            </div>

            <button id="add-resep-btn" class="action-btn-secondary"> [+ Tambah Bahan Lain] </button>
        </div>

        <hr>

        <div class="action-bar">
            <button id="save-btn" class="action-btn-primary"> [SIMPAN MENU & RESEP] </button>
            <button class="action-btn-cancel"> [BATAL] </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
